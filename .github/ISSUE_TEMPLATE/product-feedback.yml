name: Product feedback
description: Share feedback about SnapMog modes, onboarding, privacy, or safety.
title: "[Product]: "
labels: ["type: feature", "status: needs triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Blind Snapshot Duel
        - Live Duel
        - Camera permission flow
        - Privacy or safety
        - Leaderboard
        - Omoggle alternative page
        - Other
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What should SnapMog improve?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it matters
      description: Explain the user problem or confusion.
    validations:
      required: false
